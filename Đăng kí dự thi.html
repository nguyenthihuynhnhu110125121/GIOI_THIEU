<div class="container">
    <div class="header">
        <img src="logo_bo_giao_duc.png" alt="Logo">
        <h2>KỲ THI TỐT NGHIỆP THPT</h2>
    </div>
    
    <div class="content-wrapper">
        <!-- Cột Đăng nhập -->
        <div class="login-section">
            <h3>ĐĂNG NHẬP</h3>
            <form>
                <label>Số CCCD/CMND/ĐDCN (*)</label>
                <input type="text" placeholder="Nhập số định danh">
                
                <label>Mã đăng nhập (*)</label>
                <input type="password" placeholder="Nhập mã đăng nhập">
                
                <label>Mã xác nhận (*)</label>
                <div class="captcha-group">
                    <input type="text">
                    <span class="captcha-code">5FJP0</span>
                </div>
                
                <button type="submit" class="btn-login">Đăng nhập</button>
                <button type="button" class="btn-sso">Đăng nhập Cổng dịch vụ công quốc gia</button>
            </form>
        </div>

        <!-- Cột Thông báo -->
        <div class="info-section">
            <h3>THÔNG BÁO</h3>
            <ul>
                <li>Thí sinh đăng ký dự thi trực tuyến từ ngày...</li>
                <li>Lưu ý kiểm tra thông tin cá nhân...</li>
            </ul>
        </div>
    </div>
</div>
