<!DOCTYPE html>
<html>
<head>
    <title>Đăng Nhập</title>
    <style>
     /* Thêm màu nền xanh lá cây nhạt cho toàn bộ trang web */
        body {
            background-color: #e8f5e9; 
            margin: 0;
            font-family: Arial, sans-serif;
        }
        /* Khung chứa biểu mẫu đăng nhập */
        .login-box {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        /* Định dạng hình ảnh của bạn */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* Làm tròn ảnh */
            object-fit: cover; /* Giúp ảnh không bị móp, méo */
        }
        /* Ô nhập liệu và nút bấm */
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }
        button {
            background-color: #04AA6D;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-box">
    
    <img src="nhu.jpg" class="avatar" alt="nhu khung">
    <h2>Đăng Nhập</h2>
    
    <form action="#">
        <input type="text" placeholder="Tên đăng nhập" required>
        <input type="password" placeholder="Mật khẩu" required>
        <button type=><a href="nhukhung.html" class="nhu khung"> let goo</a></button>
    </form>
</div>

</body>
</html>
